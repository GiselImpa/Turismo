<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto - Tours Geovana</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="site-header">
        <h1 class="logo">Tours Geoavana</h1>

        <!-- Botón hamburguesa -->
        <input type="checkbox" id="toggle-menu">
        <label for="toggle-menu" class="hamburguesa">
            ☰
        </label>

        <nav class="mega-nav">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="destino.html">Destinos</a></li>
                <li><a href="agencias.html">Agencias</a></li>
                <li><a href="precios.html">Precios</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contactos.html">Contacto</a></li>
            </ul>
        </nav>
    </header>


    <main>

        <h2 class="titulo-pagina">Contacto</h2>

        <section class="formulario-contacto">

            <form id="formContacto">

                <label>Nombre completo
                    <input type="text" required>
                </label>

                <label>Correo electrónico
                    <input type="email" required>
                </label>

                <label>Teléfono
                    <input type="tel" required>
                </label>

                <label>Motivo de consulta
                    <select required>
                        <option value="">Seleccionar...</option>
                        <option>Paquetes</option>
                        <option>Reservas</option>
                        <option>Pagos</option>
                        <option>Otro</option>
                    </select>
                </label>

                <label>Mensaje
                    <textarea required></textarea>
                </label>

                <button type="submit" class="btn-enviar">Enviar</button>

            </form>

        </section>

        <!-- MODAL -->
        <div class="modal" id="modal">
            <div class="modal-content">
                <h3>¡Mensaje enviado!</h3>
                <p>Nos pondremos en contacto pronto.</p>
                <button id="cerrarModal">Cerrar</button>
            </div>
        </div>

        <!-- SPINNER -->
        <div class="spinner" id="spinner"></div>

    </main>

    <footer class="site-footer">
        <p>© 2026 Tours Geovana</p>
        <!-- Newsletter -->
        <section class="newsletter">
            <h3>Suscribite al newsletter</h3>
            <form class="newsletter-form">
                <input type="email" placeholder="Tu correo electrónico" required>
                <button type="submit">Suscribirme</button>
            </form>
        </section>

        <!-- Redes sociales -->
        <section class="social">
            <h3>Seguinos</h3>
            <div class="social-links">
                <a href="#" aria-label="Instagram">Instagram</a>
                <a href="#" aria-label="Facebook">Facebook</a>
                <a href="#" aria-label="TikTok">TikTok</a>
            </div>
        </section>

        <!-- Mapa -->
        <section class="mapa">
            <h3>Encontranos</h3>
            <iframe
                src="https://www.openstreetmap.org/export/embed.html?bbox=-64.512%2C-24.308%2C-64.450%2C-24.260&layer=mapnik&marker=-24.285%2C-64.480"
                style="border:0; width:100%; height:250px;" loading="lazy">
            </iframe>

        </section>

    </footer>

    <script src="js/Contacto.js"></script>

</body>

</html>
